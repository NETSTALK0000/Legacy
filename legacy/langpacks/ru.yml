quickstart:
  base: "🌙🇷🇺 <b>Привет.</b> Твой юзербот <b>Legacy</b> установлен.\n\n❓ <b>Нужна помощь?</b> Вступай в наш чат поддержки. Мы помогаем <b>всем</b>.\n\n📣 <b>Загляни в каналы с модулями, созданными комьюнити: <a href=\"https://t.me/hikka_ub/126\">показать</a></b>\n\n💁‍♀️ <b>Быстрый гайд:</b>\n\n1️⃣ <b>Напиши</b> <code>.help</code> <b>чтобы увидеть список модулей</b>\n2️⃣ <b>Напиши</b> <code>.help &lt;Название модуля/команда&gt;</code> <b>чтобы увидеть описание модуля</b>\n3️⃣ <b>Напиши</b> <code>.dlmod &lt;ссылка&gt;</code> <b>чтобы загрузить модуль из ссылки</b>\n4️⃣ <b>Напиши</b> <code>.loadmod</code> <b>ответом на файл, чтобы загрузить модуль из него</b>\n5️⃣ <b>Напиши</b> <code>.unloadmod &lt;Название модуля&gt;</code> <b>чтобы выгрузить модуль</b>\n\n💡 <b>Legacy поддерживает модули из Friendly-Telegram и GeekTG, а также свои собственные.</b>\n"
  railway: "🚂 <b>Твой юзербот установлен на Railway</b>. На этой платформе ты получаешь только <b>500 бесплатных часов в месяц</b>. Когда лимит будет достигнет, твой <b>юзербот будет заморожен</b>. В следующем месяце <b>ты должен будешь перейти на https://railway.app и перезапустить его</b>."
  language_saved: "🇷🇺 Язык сохранен!"
  language: "🇷🇺 Русский"
  btn_support: "🥷 Чат поддержки"
  _cls_doc: "Уведомляет пользователя об установке юзербота"

