settings:
  choose_installation: "🌙 <b>Выберите вариант установки Legacy:</b>"
  vds: "💎 VDS"
  docker: "🐳 Docker"
  railway: "🚂 Railway"
  hikkahost: "🌒 HikkaHost"
  hikkahost_install: "🌙 <b>Установка на 🌒 HikkaHost:</b>\n\n<b>Перейдите в @hikkahost_bot и следуйте дальнейшим инструкциям</b>"
  railway_install: "🌙  <b>Установка на 🚂 RailWay:</b>\n\n<b>Ссылка для установки:</b>\nhttps://railway.com/template/47hYUn?referralCode=PvevLV\n\n<i><u>Будьте осторожны! Любые юзерботы официально запрещены на RailWay, если ваш аккаунт забанен, ни создатель, ни другие люди не виноваты в этом.</u></i>"
  main_menu: "◀ Выбрать другую платформу"
  vds_install: "<b>🚀 Legacy — Запуск и аргументы командной строки</b>\n\n<b>🌙 Установка на 💎 VDS</b>\n<pre><code class='language-bash'>sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/Crayz310/Legacy &amp;&amp; cd Legacy &amp;&amp; export AIOHTTP_NO_EXTENSIONS=1 &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m legacy</code></pre>\n\n<b><i>⚡️ Если у вас нет доступа </i></b><code>sudo</code><b><i> просто пропустите начальные действия.</i></b>\n\n<b>⚙️ Доступные аргументы</b>\n\n<code>--bot-token</code> или <code>-bt &lt;token&gt;</code> Указать токен вашего inline бота напрямую.\n<code>--no-web</code> Запустить Legacy <b>прямо в терминале</b> вместо использования веб-ссылки для входа.\n<code>--root</code> Разрешить запуск Legacy от имени root (отключает предупреждения безопасности).\n<code>--no-tty</code> Отключить цветной ANSI вывод (только обычный текст)."
  docker_install: "<b>🐳 Legacy — Руководство по установке Docker</b>\n\n<b>🌙 Сборка образа:</b>\n<pre><code class='language-bash'>git clone https://github.com/Crayz310/Legacy &amp;&amp; cd Legacy &amp;&amp; sudo docker build . -t Crayz310/legacy:latest</code></pre>\n<b>🚀 Запуск контейнера:</b>\n<pre><code class='language-bash'>sudo docker run --restart=unless-stopped --name &lt;container name&gt; -p &lt;port&gt;:8080 --detach -it Crayz310/legacy:latest</code></pre>\n\n<code>--restart=unless-stopped</code> автоматически перезапускает контейнер, если он не был остановлен вручную.\n<code>--name &lt;container_name&gt;</code> задать собственное имя для вашего контейнера  \n<code>-p &lt;port&gt;:8080</code> привязать Legacy к нужному порту на хосте  \n<code>--detach -it</code> запустить в фоновом режиме с включенным интерактивным режимом"
  close_btn: "🔻 Закрыть"
