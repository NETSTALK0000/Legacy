  _cfg_banner: "Ссылка на баннер-картинку"
  _cfg_media_quote: "Цитирует баннер если он есть"
  setinfo_no_args: "<emoji document_id=5370881342659631698>😢</emoji> <b>Тебе нужно указать текст для кастомного инфо</b>"
  setinfo_success: "<emoji document_id=5436040291507247633>🎉</emoji> <b>Текст инфо успешно изменен</b>"
  desc: "✨ Что такое Userbot?\n\n<emoji document_id=5474667187258006816>😎</emoji> Userbot — это специальная программа, которая подключается к аккаунту и использует Telegram API для автоматизации любых задачи прямо от имени вашего аккаунта.\n\nС помощью юзербота вы можете упростить работу и сэкономить кучу времени. В одном чате можно делать практически всё, не выходя из него:\n<emoji document_id=5021905410089550576>✅</emoji> писать и планировать сообщения\n<emoji document_id=5021905410089550576>✅</emoji> публиковать посты в Telegram, ВКонтакте и других соцсетях (не выходя из телеграма)\n<emoji document_id=5021905410089550576>✅</emoji> скачивать и пересылать медиафайлы там где это запрещено\n<emoji document_id=5021905410089550576>✅</emoji> управлять подписками и рассылками\n<emoji document_id=5021905410089550576>✅</emoji> Выкладывать информацию в свой тг канал не выходя из группы или личного чата\n<emoji document_id=5021905410089550576>✅</emoji> Поддержка Python, C++ и других языков программирования для создания разных скриптов которые вы пожелаете...\n<emoji document_id=5021905410089550576>✅</emoji> Отправлять анимированые действия сердечки и так далее...\n<emoji document_id=5021905410089550576>✅</emoji> администрировать и обеспечивать безопасность — управлять правами, банить нарушителей, фильтровать спам и логировать действия\n\nЭто лишь малая часть функционала — всё перечисленное выше составляет примерно 1 - 5% возможностей юзербота.\n\n<emoji document_id=5424972470023104089>🔥</emoji> Чем Userbot отличается от обычного бота в Telegram?\n\nВ отличие от стандартных ботов, которые работают только через отдельный бот-аккаунт, юзербот запускается от вашего личного профиля. Благодаря этому:\n\n<emoji document_id=5472164874886846699>✨</emoji> у него больше прав и функций\n<emoji document_id=5472164874886846699>✨</emoji> он может обходить многие ограничения телеграм (например пересылать сообщения оттуда там где это запрещено, искать приватные группы и многое многое другое...)\n<emoji document_id=5472164874886846699>✨</emoji> позволяет максимально гибко настраивать автоматизацию под любые задачи\n\nС юзерботом всё становится проще. Вы управляете своими чатами, каналами и контентом в разы быстрее — и без лишних переключений между приложениями."
  _cmd_doc_ubinfo: "Отправить информацию по типу 'Что такое Userbot?'"
  _cmd_doc_info: "Отправляет информацию о боте"
  _cmd_doc_setinfo: "<текст> - Изменить текст в .info"
  _cls_doc: "Показать информацию о юзерботе"

