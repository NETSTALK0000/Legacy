settings:
  choose_installation: "🌙 <b>Виберіть варіант встановлення Legacy:</b>"
  vds: "💎 VDS"
  docker: "🐳 Docker"
  railway: "🚂 Railway"
  railway_install: "🌙 <b>Встановлення на 🚂 RailWay:</b>\n\n<b>Посилання для встановлення:</b>\nhttps://railway.com/template/47hYUn?referralCode=PvevLV\n\n<i><u>Будьте обережні! Будь-які користувацькі боти офіційно заборонені на RailWay, якщо ваш обліковий запис буде заблоковано, ні творець, ні інші люди не несуть за це відповідальності.</u></i>"
  main_menu: "◀ Вибрати іншу платформу"
  vds_install: "<b>🚀 Legacy — Запуск та аргументи командного рядка</b>\n\n<b>🌙 Встановлення на 💎 VDS</b>\n<pre><code class='language-bash'>sudo apt update &amp;&amp; sudo apt upgrade -y &amp;&amp; sudo apt install git python3-pip &amp;&amp; git clone https://github.com/NETSTALK0000/Legacy &amp;&amp; cd Legacy &amp;&amp; export AIOHTTP_NO_EXTENSIONS=1 &amp;&amp; pip install -r requirements.txt &amp;&amp; python3 -m legacy</code></pre>\n\n<b><i>⚡️ Якщо у вас немає доступу </i></b><code>sudo</code><b><i> просто пропустіть перші кроки.</i></b>\n\n<b>⚙️ Доступні аргументи</b>\n\n<code>--bot-token</code> або <code>-bt &lt;token&gt;</code> Вказати токен вашого inline бота напряму.\n<code>--no-web</code> Запустити Legacy <b>безпосередньо в терміналі</b> замість використання веб-посилання для входу.\n<code>--root</code> Дозволити запуск Legacy від імені root (вимикає попередження безпеки).\n<code>--no-tty</code> Вимкнути кольоровий ANSI вивід (лише звичайний текст)."
  docker_install: "<b>🐳 Legacy — Посібник з встановлення Docker</b>\n\n<b>🌙 Збірка образу:</b>\n<pre><code class='language-bash'>git clone https://github.com/NETSTALK0000/Legacy &amp;&amp; cd Legacy &amp;&amp; sudo docker build . -t NETSTALK0000/legacy:latest</code></pre>\n<b>🚀 Запуск контейнера:</b>\n<pre><code class='language-bash'>sudo docker run --restart=unless-stopped --name &lt;container name&gt; -p &lt;port&gt;:8080 --detach -it NETSTALK0000/legacy:latest</code></pre>\n\n<code>--restart=unless-stopped</code> автоматично перезапускає контейнер, якщо він не був зупинений вручну.\n<code>--name &lt;container_name&gt;</code> встановити власне ім'я для вашого контейнера  \n<code>-p &lt;port&gt;:8080</code> прив'язати Legacy до потрібного порту на хості  \n<code>--detach -it</code> запустити у фоновому режимі з включеним інтерактивним режимом"
  close_btn: "🔻 Закрити"
  too_many_args: "<emoji document_id=5210952531676504517>🚫</emoji> <bЗанадто багато аргументів</b>"
