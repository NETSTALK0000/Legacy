quickstart:
  base: "🌙🇺🇦 <b>Привіт.</b> Твій юзербот <b>Legacy</b> встановлено.\n\n❓ <b>Потрібна допомога?</b> Заходь до нашого чату, у ньому ми допомагаємо <b>усім</b>.\n\n📣 <b>Зазирни в канали з модулями, створеними ком'юніті: <a href=\"https://t.me/hikka_ub/126\">показати</a></b>\n\n💁‍♀️ <b>Швидкий гайд:</b>\n\n1️⃣ <b>Напиши</b> <code>.help</code> <b>щоб побачити список модулів</b>\n2️⃣ <b>Напиши</b> <code>.help &lt;Назву модуля/команди&gt;</code> <b>щоб побачити опис модуля</b>\n3️⃣ <b>Напиши</b> <code>.dlm &lt;посилання&gt;</code> <b>щоб завантажити модуль з посилання</b>\n4️⃣ <b>Напиши</b> <code>.lm</code> <b>відповіддю на файл, щоб завантажити модуль із нього</b>\n5️⃣ <b>Напиши</b> <code>.ulm &lt;Назву модуля&gt;</code> <b>щоб вивантажити модуль</b>\n\n💡 <b>Legacy підтримує модулі з Friendly-Telegram та GeekTG, а також свої особисті.</b>\n"
  railway: "🚂 <b>Ти встановив юзербота на Railway, вітаю!</b>. На цій платформі ти отримуєш лише <b>500 безкоштовних годин на місяць</b>. Коли ліміт буде досягнуто, твій <b>юзербот буде заморожено</b>. Наступного місяця <b>ти повинен будеш перейти на https://railway.app і перезапустити його</b>."
