  setinfo_no_args: "<emoji document_id=5370881342659631698>😢</emoji> <b>Тобі потрібно вказати текст для кастомного інфо</b>"
  setinfo_success: "<emoji document_id=5436040291507247633>🎉</emoji> <b>Текст інфо успішно змінено</b>"
  desc: "<emoji document_id=5472164874886846699>✨</emoji> Що таке Userbot?\n\n<emoji document_id=5474667187258006816>😎</emoji> Userbot — це спеціальна програма, яка підключається до вашого акаунта та використовує Telegram API для автоматизації будь-яких завдань прямо від вашого імені.\n\nЗа допомогою юзербота ви можете спростити роботу та заощадити купу часу. В одному чаті можна робити практично все, не виходячи з нього:\n<emoji document_id=5021905410089550576>✅</emoji> писати та планувати повідомлення\n<emoji document_id=5021905410089550576>✅</emoji> публікувати пости в Telegram, ВКонтакті та інших соцмережах (не виходячи з телеграму)\n<emoji document_id=5021905410089550576>✅</emoji> завантажувати та пересилати медіафайли там, де це заборонено\n<emoji document_id=5021905410089550576>✅</emoji> керувати підписками та розсилками\n<emoji document_id=5021905410089550576>✅</emoji> викладати інформацію у свій ТГ-канал, не виходячи з групи чи особистого чату\n<emoji document_id=5021905410089550576>✅</emoji> підтримка Python, C++ та інших мов програмування для створення різних скриптів на ваш вибір...\n<emoji document_id=5021905410089550576>✅</emoji> надсилати анімовані дії (сердечка тощо)\n<emoji document_id=5021905410089550576>✅</emoji> адмініструвати та забезпечувати безпеку — керувати правами, блокувати порушників, фільтрувати спам і логувати дії\n\nЦе лише мала частина функціоналу — все перераховане вище становить приблизно 1–5% можливостей юзербота.\n\n<emoji document_id=5424972470023104089>🔥</emoji> Чим Userbot відрізняється від звичайного бота в Telegram?\n\nНа відміну від стандартних ботів, які працюють лише через окремий бот-акаунт, юзербот запускається від вашого особистого профілю. Завдяки цьому:\n\n<emoji document_id=5472164874886846699>✨</emoji> у нього більше прав і функцій\n<emoji document_id=5472164874886846699>✨</emoji> він може обходити багато обмежень Telegram (наприклад, пересилати повідомлення звідти, де це заборонено, шукати приватні групи та багато іншого...)\n<emoji document_id=5472164874886846699>✨</emoji> дозволяє максимально гнучко налаштовувати автоматизацію під будь-які задачі\n\nЗ юзерботом усе стає простіше. Ви керуєте своїми чатами, каналами та контентом у рази швидше — і без зайвих переключень між додатками."
  _cmd_doc_ubinfo: "Надіслати інформацію на кшталт 'Що таке Userbot?'"
  _cmd_doc_info: "Надсилає інформацію про бота"
  _cmd_doc_setinfo: "<текст> - Змінити текст у .info"
  _cls_doc: "Показати інформацію про юзербота"

